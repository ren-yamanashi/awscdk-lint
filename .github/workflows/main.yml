name: main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  integration:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.deploy-gate.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@0452b83a3d3b623343a020cf6ee59c7f0c8e1d0e # v1
        with:
          node-version: "24.14.1"
          cache: true
      - name: Install dependencies
        run: vp install --frozen-lockfile
      - name: Build package
        run: vp run pack
      - name: Run Unit Tests
        run: vp test --run
      - name: Run Integration Tests
        run: vp run test:integration
      - name: Run Vite+ Checks
        run: vp check
      - name: Build docs
        run: vp run -F @eslint-plugin-awscdk/docs build
      - name: Configure custom domain
        run: |
          echo "awscdk-lint.dev" > docs/.vitepress/dist/CNAME
          cp -r docs/public/* docs/.vitepress/dist/
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs/.vitepress/dist
      - name: Check Docs Deploy label
        id: deploy-gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_label=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[].labels[].name] | index("Docs: Deploy") != null')
          echo "Docs: Deploy label present: $has_label"
          echo "deploy=$has_label" >> "$GITHUB_OUTPUT"

  deploy:
    needs: integration
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.integration.outputs.should-deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
