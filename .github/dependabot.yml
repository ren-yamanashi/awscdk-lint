version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"

  # Keep ESLint v9 for classic config example
  - package-ecosystem: "npm"
    directory: "/examples/classic-config"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
